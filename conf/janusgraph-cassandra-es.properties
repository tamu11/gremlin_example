# JanusGraph configuration for Cassandra backend

# Graph database configuration
storage.backend=cql
storage.hostname=127.0.0.1

# Storage configuration
cache.db-cache = true
cache.db-cache-clean-wait = 20
cache.db-cache-flush-wait = 120
cache.db-cache-size = 0.5

# Locking configuration
locks.backend=consistencykeys
locks.impl=org.janusgraph.diskstore.locking.consistency.ConsistencyLock

# Index configuration
index.backends=elasticsearch
index.elasticsearch.client-only=false
index.elasticsearch.elasticsearch-client450-class=org.elasticsearch.client.transport.TransportClient
index.elasticsearch.elasticsearch-client450-cluster-name=elasticsearch
index.elasticsearch.elasticsearch-client450-hosts=127.0.0.1
index.elasticsearch.elasticsearch-client450-local-mode=false
index.elasticsearch.read-only=false
index.elasticsearch.io-configurer=org.janusgraph.diskstorage.es.ElasticSearchIndexIOSideEffects

# Graph cache
cache.astjanusgraphgraph-cache = true

# Transaction settings
transaction.log.ms=14d
