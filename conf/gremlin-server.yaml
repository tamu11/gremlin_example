# Configuration for Gremlin Server with JanusGraph

# Uncomment and modify the following to use JanusGraph
# graphProvider: org.janusgraph.graphdb.database.StandardJanusGraphFactory
# graph: conf/janusgraph-cassandra-es.properties

# Uncomment the following to enable JanusGraph
# channelizer: org.apache.tinkerpop.gremlin.server.channel.WebSocketChannelizer
# graphManager: org.janusgraph.graphdb.management.JanusGraphManager
# graphs: {
#   graph: conf/janusgraph-cassandra-es.properties
# }

# Max concurrent connections
maxInitialLineLength: 4096
maxHeaderSize: 8192
maxContentLength: 1048576
maxChunkSize: 8192

# Gremlin Server settings
host: 0.0.0.0
port: 8182

# Websocket settings
webSocketMaxTextMessageSize: 1048576
webSocketMaxFrameSize: 65536

# Script evaluation
scriptEvaluationTimeout: 30000
opEvaluationTimeout: 30000
restTranslator: org.apache.tinkerpop.gremlin.driver.translator.WebSocketWebSocketsTranslator

# Serializers
serializers:
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GraphBinaryMessageSerializerV1 }
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GryoMessageSerializerV3 }
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GryoMessageSerializerV1 }
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GraphSONMessageSerializerGryoV1d0 }
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GraphSONMessageSerializerGremlinV2d0 }
  - { className: org.apache.tinkerpop.gremlin.driver.ser.GraphSONMessageSerializerV3 }

# Processors
processors:
  - { className: org.apache.tinkerpop.gremlin.server.op.session.SessionProcessor }
  - { className: org.apache.tinkerpop.gremlin.server.op.traversal.TraversalProcessor }

# Metrics
metrics:
  enabled: true
  consoleEnabled: true
  interval: 1000
  jmxEnabled: true

# Gremlin Engine
gremlinEngine:
  traversalSourceManager: org.apache.tinkerpop.gremlin.server.op.TraversalSourceManager
  cacheExpirationTime: 30000
  cacheMaxSize: 1000
  scriptFile: conf/empty-sample.groovy
  scriptEngineConfig: { staticImport: [java.lang.Math], import: [java.util.regex.Pattern] }
